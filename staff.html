<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Tech | Staff Portal</title>
  <link rel="icon" type="image/png" href="/logo1.png">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: rgba(2, 6, 23, 0.95);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 2005;
      transition: transform 0.3s ease;
    }
    .sidebar-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: rgba(6, 182, 212, 0.1);
      color: var(--cyan);
    }
    .main-content {
      padding: 40px;
      background: #020617;
    }
    .mobile-admin-header {
      display: none;
      padding: 16px 20px;
      background: rgba(2, 6, 23, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 900;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      padding: 24px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 8px;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .data-table th {
      text-align: left;
      padding: 16px;
      color: #94a3b8;
      font-size: 0.875rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .data-table td {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    .status-completed { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    
    @media (max-width: 1024px) {
      .admin-container {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
        width: 280px;
        z-index: 2100;
      }
      .sidebar.show {
        transform: translateX(0);
      }
      .mobile-admin-header {
        display: flex;
      }
      .main-content {
        padding: 20px;
      }
    }
  </style>
</head>
<body class="bg-slate-950 text-white">
  <div class="mobile-admin-header">
    <a href="/" class="logo flex items-center gap-2">
      <div class="w-8 h-8 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-cyan-500/20">
        <span class="text-white font-black text-lg">L</span>
      </div>
    </a>
    <button id="admin-mobile-toggle" class="text-2xl text-cyan-400">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo mb-8">
        <a href="/" class="logo flex items-center gap-2">
          <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-cyan-500/20">
            <span class="text-white font-black text-xl">L</span>
          </div>
          <span class="text-xl font-bold tracking-tight text-white">Lumina <span class="text-cyan-400">Tech</span></span>
        </a>
      </div>
      <nav>
        <ul class="sidebar-nav">
          <li><a href="#" class="active"><i class="fas fa-tasks"></i> My Tasks</a></li>
          <li><a href="#" id="nav-attendance-staff"><i class="far fa-clock"></i> Attendance</a></li>
          <li><a href="#"><i class="fas fa-calendar-check"></i> Schedule</a></li>
          <li><a href="#"><i class="fas fa-user-circle"></i> My Profile</a></li>
        </ul>
      </nav>
      <div class="mt-auto">
        <button id="logout-btn" class="btn-secondary w-full flex items-center justify-center gap-2">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="flex justify-between items-center mb-12">
        <div>
          <h1 class="text-3xl font-bold">Hello, <span class="text-cyan-400" id="welcome-name">Staff Member</span></h1>
          <p class="text-slate-400">You have <span id="task-count">0</span> tasks to complete today.</p>
        </div>
        <div class="flex gap-4 items-center">
          <select class="currency-selector glass bg-transparent border-none text-xs font-bold text-cyan-400 focus:outline-none cursor-pointer">
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="GBP">GBP (£)</option>
            <option value="NGN">NGN (₦)</option>
          </select>
          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
            <i class="fas fa-moon"></i>
          </button>
          <button class="glass p-3 rounded-full text-slate-400 hover:text-white transition-colors">
            <i class="fas fa-bell"></i>
          </button>
          <div class="flex items-center gap-3 glass px-4 py-2 rounded-full">
            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">S</div>
            <span class="font-semibold">Staff User</span>
          </div>
        </div>
      </header>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card glass text-center">
          <span class="text-slate-400 text-sm uppercase tracking-widest font-bold">Tasks Completed</span>
          <div class="stat-value" id="staff-completed-tasks-stat">0</div>
        </div>
        <div class="stat-card glass text-center">
          <span class="text-slate-400 text-sm uppercase tracking-widest font-bold">Current Streak</span>
          <div class="stat-value" id="staff-streak-stat">0</div>
        </div>
        <div class="stat-card glass text-center">
          <span class="text-slate-400 text-sm uppercase tracking-widest font-bold">Attendance Rate</span>
          <div class="stat-value" id="staff-attendance-rate-stat">0%</div>
          <span class="text-emerald-400 text-xs font-bold" id="staff-attendance-detail">Excellent</span>
        </div>
      </div>

      <!-- My Tasks -->
      <section class="glass p-8">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-xl font-bold">My Active Tasks</h2>
          <div class="flex items-center gap-4">
            <select id="task-status-filter" class="glass bg-transparent border-none text-xs font-bold text-slate-400 focus:outline-none cursor-pointer">
              <option value="all">All Tasks</option>
              <option value="pending" selected>Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Task Name</th>
                <th>Project</th>
                <th>Deadline</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="my-tasks-table-body">
              <tr><td colspan="5" class="text-center py-8 text-slate-500">Loading your tasks...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Task Detail Modal -->
      <div id="task-detail-modal" class="modal-overlay">
        <div class="modal-content glass max-w-lg w-full">
          <span id="task-detail-close" class="modal-close"><i class="fas fa-times"></i></span>
          <div id="task-detail-content">
            <!-- Content populated by JS -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { checkSession } from './auth.js';
    checkSession();
  </script>
  <script type="module" src="/script.js"></script>
</body>
</html>
